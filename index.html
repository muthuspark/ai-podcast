<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Podcast</title>
<style>
  :root { --bg:#0f1014; --fg:#e7e7ea; --dim:#6b6d77; --accent:#7c9cff; --card:#181a20; }
  * { box-sizing: border-box; }
  body {
    margin:0; min-height:100vh; background:var(--bg); color:var(--fg);
    font:16px/1.6 system-ui,-apple-system,sans-serif;
    display:flex; justify-content:center; padding:48px 20px;
  }
  main { width:100%; max-width:620px; }
  h1 { font-size:22px; font-weight:600; letter-spacing:-.01em; margin:0 0 28px; }
  h1 span { color:var(--dim); font-weight:400; }
  form { display:flex; flex-direction:column; gap:14px; }
  input, select, button { font:inherit; color:var(--fg); }
  input, select {
    background:var(--card); border:1px solid #262932; border-radius:10px;
    padding:13px 15px; outline:none;
  }
  input:focus, select:focus { border-color:var(--accent); }
  .row { display:flex; gap:10px; }
  .row select { flex:0 0 130px; }
  .row input { flex:1; }
  button {
    background:var(--accent); color:#0b0d12; border:0; border-radius:10px;
    padding:13px; font-weight:600; cursor:pointer;
  }
  button:disabled { opacity:.4; cursor:default; }
  .ghost { background:transparent; color:var(--fg); border:1px solid #2b2f3a; }
  /* 3D speaker stage */
  .stage { margin:24px 0 6px; }
  #heads { display:block; width:100%; height:230px; border-radius:14px;
    background:radial-gradient(120% 90% at 50% 18%, #1b1e27 0%, #101218 70%); }
  .labels { display:flex; margin-top:8px; }
  .labels .lab { flex:1; text-align:center; transition:opacity .25s; opacity:.45; }
  .labels .lab.active { opacity:1; }
  .labels .lab b { display:block; font-size:13px; font-weight:600; }
  .labels .lab.active b { color:var(--accent); }
  .labels .lab span { color:var(--dim); font-size:11px; line-height:1.25; }
  .controls { display:flex; gap:8px; margin:22px 0 18px; }
  .controls button { flex:1; padding:11px; }
  #transcript { display:flex; flex-direction:column; gap:4px; }
  .turn { padding:11px 14px; border-radius:10px; opacity:.4; transition:opacity .2s,background .2s; }
  .turn.spoken { opacity:.7; }
  .turn.active { opacity:1; background:var(--card); }
  .turn .who { color:var(--accent); font-weight:600; font-size:13px; display:block; }
  .status { color:var(--dim); font-size:14px; margin:18px 0; min-height:20px; }
  .err { color:#ff7b7b; }
  .pausebar { display:flex; align-items:center; gap:12px; margin:0 0 18px; font-size:13px; color:var(--dim); }
  .pausebar input[type=range] { flex:1; accent-color:var(--accent); }
  .pausebar input[type=number] {
    width:72px; padding:6px 8px; background:var(--card); border:1px solid #262932;
    border-radius:8px; color:var(--fg); font:inherit; text-align:right;
  }
  .pausebar label { white-space:nowrap; }
  .hidden { display:none; }
</style>
<script type="importmap">
{ "imports": {
    "three": "/static/three.module.js",
    "three/addons/": "/static/jsm/"
} }
</script>
</head>
<body>
<main>
  <h1>AI Podcast <span>· local</span></h1>

  <form id="form">
    <input id="topic" placeholder="Discussion topic…" autocomplete="off" required>
    <div class="row">
      <select id="speakers">
        <option value="1">1 speaker</option>
        <option value="2" selected>2 speakers</option>
        <option value="3">3 speakers</option>
        <option value="4">4 speakers</option>
      </select>
      <button id="start" type="submit">Start</button>
    </div>
  </form>

  <div id="stage" class="stage hidden">
    <canvas id="heads"></canvas>
    <div id="labels" class="labels"></div>
  </div>
  <div id="status" class="status"></div>

  <div id="controls" class="controls hidden">
    <button class="ghost" id="playpause">Pause</button>
    <button class="ghost" id="stop">Stop</button>
    <button class="ghost" id="restart">Restart</button>
    <button class="ghost" id="export" disabled>Export</button>
  </div>

  <div id="pausebar" class="pausebar hidden">
    <label for="gap">Pause between speakers</label>
    <input type="range" id="gap" min="0" max="1500" step="10" value="135">
    <input type="number" id="gapnum" min="0" max="3000" step="10" value="135">
    <span>ms</span>
  </div>

  <div id="transcript"></div>
  <audio id="audio"></audio>
</main>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
import { clone as skClone } from 'three/addons/utils/SkeletonUtils.js';

const $ = id => document.getElementById(id);
const audio = $('audio');
let sid = null, ready = new Set(), cur = -1, n = 0, finished = false, lines = [];

// --- inter-speaker pause (ms), live at playback (Stivers et al. 2009 ≈ 135ms) ---
let gapMs = 135;
const gapRange = $('gap'), gapNum = $('gapnum');
function setGap(v){ gapMs = Math.max(0, Math.min(3000, +v || 0)); gapRange.value = Math.min(gapMs, 1500); gapNum.value = gapMs; }
gapRange.addEventListener('input', () => setGap(gapRange.value));
gapNum.addEventListener('input', () => setGap(gapNum.value));

function setStatus(msg, err=false){ $('status').className = 'status' + (err?' err':''); $('status').textContent = msg; }

// ---------------- Web Audio: live volume of the playing clip ----------------
let actx, analyser, dataArr;
function audioGraph(){            // must run from a user gesture (Start click)
  if (actx){ actx.resume(); return; }
  actx = new (window.AudioContext || window.webkitAudioContext)();
  const src = actx.createMediaElementSource(audio);   // once per element
  analyser = actx.createAnalyser(); analyser.fftSize = 256;
  src.connect(analyser); analyser.connect(actx.destination);
  dataArr = new Uint8Array(analyser.fftSize);
}
function volume(){
  if (!analyser || audio.paused) return 0;
  analyser.getByteTimeDomainData(dataArr);
  let s = 0; for (let i = 0; i < dataArr.length; i++){ const x = (dataArr[i]-128)/128; s += x*x; }
  return Math.min(1, Math.sqrt(s/dataArr.length) * 4);
}

// ---------------- Three.js stage: one realistic head per speaker ----------------
const HEAD_H = 1.4, SPACING = 1.3;   // head height in scene units, x-gap between heads
let renderer, scene, camera, headTemplate = null, headsByName = {}, activeName = null;

const lerp = (a, b, t) => a + (b - a) * t;
const setMorph = (m, d, name, v) => { if (d[name] != null) m[d[name]] = v; };

const templateReady = (async () => {
  renderer = new THREE.WebGLRenderer({ canvas: $('heads'), antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(30, 2, 0.1, 100);
  scene.add(new THREE.AmbientLight(0xffffff, 1.15));
  const key = new THREE.DirectionalLight(0xffffff, 2.2); key.position.set(0.4, 0.9, 2); scene.add(key);
  const fill = new THREE.DirectionalLight(0xcdddff, 0.5); fill.position.set(-1.2, 0.2, 1); scene.add(fill);

  const ktx2 = new KTX2Loader().setTranscoderPath('/static/jsm/libs/basis/').detectSupport(renderer);
  const loader = new GLTFLoader().setKTX2Loader(ktx2).setMeshoptDecoder(MeshoptDecoder);
  const gltf = await loader.loadAsync('/static/facecap.glb');
  headTemplate = gltf.scene;
  requestAnimationFrame(renderStage);
})().catch(e => { console.error('3D head failed to load:', e); });

function morphMeshOf(root){
  let mesh = null;
  root.traverse(o => { if (o.morphTargetDictionary && 'jawOpen' in o.morphTargetDictionary) mesh = o; });
  return mesh;
}

async function buildHeads(speakers){
  await templateReady;
  if (!headTemplate) return;
  Object.values(headsByName).forEach(h => scene.remove(h.group));
  headsByName = {};
  const N = speakers.length;
  speakers.forEach((s, i) => {
    const root = skClone(headTemplate);
    const mesh = morphMeshOf(root);
    mesh.morphTargetInfluences = mesh.morphTargetInfluences.slice();   // independent per head
    mesh.material = mesh.material.clone();
    mesh.material.color = new THREE.Color().setHSL(((i * 67) % 360) / 360, 0.22, 0.86);  // gentle per-speaker tint
    // recenter + scale to a uniform height
    const box = new THREE.Box3().setFromObject(root), size = new THREE.Vector3(), center = new THREE.Vector3();
    box.getSize(size); box.getCenter(center);
    root.position.sub(center);
    root.scale.setScalar(HEAD_H / size.y);
    const group = new THREE.Group();
    group.add(root);
    group.position.x = (i - (N - 1) / 2) * SPACING;
    scene.add(group);
    headsByName[s.name] = { group, mesh, dict: mesh.morphTargetDictionary, blink: Math.random() * 4 };
  });
  frameCamera(N);
  resize();
}

function frameCamera(N){
  const span = (N - 1) * SPACING + 1.0;                 // total width to fit
  const aspect = camera.aspect || 2;
  const vHalf = Math.tan((camera.fov * Math.PI / 180) / 2);
  const zForWidth = (span / 2) / (vHalf * aspect);
  const zForHeight = (HEAD_H * 0.62) / vHalf;            // frame the face, not full head
  const z = Math.max(zForWidth, zForHeight) + 0.35;
  camera.position.set(0, 0.05, z);
  camera.lookAt(0, 0.05, 0);
}

function faceActive(name){
  activeName = name;
  document.querySelectorAll('.lab').forEach(l => l.classList.toggle('active', l.dataset.name === name));
}

function renderStage(t){
  requestAnimationFrame(renderStage);
  if (!scene) return;
  const now = t * 0.001, vol = volume();
  for (const [name, h] of Object.entries(headsByName)){
    const m = h.mesh.morphTargetInfluences, d = h.dict, active = name === activeName;
    // blink on an independent timer
    h.blink -= 0.016; let bl = 0;
    if (h.blink < 0){ bl = 1; if (h.blink < -0.1) h.blink = 2.5 + Math.random() * 3; }
    setMorph(m, d, 'eyeBlink_L', bl); setMorph(m, d, 'eyeBlink_R', bl);
    // mouth: jaw opens with the active speaker's volume, smoothed
    setMorph(m, d, 'jawOpen', lerp(m[d['jawOpen']] || 0, active ? vol * 0.9 : 0, 0.5));
    setMorph(m, d, 'mouthSmile_L', 0.12); setMorph(m, d, 'mouthSmile_R', 0.12);
    // idle heads tilt down a touch as if listening; active faces forward + leans in
    h.group.rotation.y = Math.sin(now * 0.6 + h.group.position.x) * 0.05;
    h.group.rotation.x = lerp(h.group.rotation.x, active ? -0.02 : 0.1, 0.08);
    h.group.scale.setScalar(lerp(h.group.scale.x, active ? 1.08 : 0.92, 0.1));
  }
  renderer.render(scene, camera);
}

function resize(){
  if (!renderer) return;
  const w = $('heads').clientWidth, hgt = $('heads').clientHeight;
  renderer.setSize(w, hgt, false);
  camera.aspect = w / hgt; camera.updateProjectionMatrix();
}
addEventListener('resize', () => { resize(); frameCamera(Object.keys(headsByName).length || 1); });

// ---------------- generation / playback ----------------
$('form').addEventListener('submit', e => {
  e.preventDefault();
  const topic = $('topic').value.trim();
  if (!topic) return;
  reset();
  audioGraph();
  $('start').disabled = true;
  setStatus('Writing the script…');
  const es = new EventSource(`/generate?topic=${encodeURIComponent(topic)}&speakers=${$('speakers').value}`);

  es.addEventListener('speakers', e => {
    const d = JSON.parse(e.data); sid = d.sid;
    $('stage').classList.remove('hidden');
    $('labels').innerHTML = d.speakers.map(s =>
      `<div class="lab" data-name="${s.name}"><b>${s.name}</b><span>${s.persona}</span></div>`).join('');
    buildHeads(d.speakers);
  });

  es.addEventListener('script', e => {
    lines = JSON.parse(e.data).lines; n = lines.length;
    $('transcript').innerHTML = lines.map((l,i) =>
      `<div class="turn" id="t${i}"><span class="who">${l.speaker}</span>${l.line}</div>`).join('');
    $('controls').classList.remove('hidden');
    $('pausebar').classList.remove('hidden');
    setStatus('Voicing the conversation…');
  });

  es.addEventListener('line', e => {
    ready.add(JSON.parse(e.data).index);
    if (cur === -1) play(0);
    else if (audio.paused && cur < n && ready.has(cur)) play(cur);
  });

  es.addEventListener('done', () => { finished = true; $('export').disabled = false; setStatus('Ready.'); es.close(); $('start').disabled = false; });
  es.addEventListener('error', e => {
    const msg = e.data ? JSON.parse(e.data).message : 'Connection lost.';
    setStatus(msg, true); es.close(); $('start').disabled = false;
  });
});

function play(i){
  if (i >= n){ highlight(-1); faceActive(null); setStatus(finished ? 'Done.' : 'Ready.'); return; }
  if (!ready.has(i)){ cur = i; setStatus('Buffering next line…'); return; }
  cur = i; highlight(i); faceActive(lines[i] && lines[i].speaker); $('playpause').textContent = 'Pause';
  audio.src = `/audio/${sid}/${i}.wav`; audio.play();
}
audio.addEventListener('ended', () => { if (cur >= 0) setTimeout(() => play(cur + 1), gapMs); });

function highlight(i){
  document.querySelectorAll('.turn').forEach((t,k) => {
    t.classList.toggle('active', k === i);
    t.classList.toggle('spoken', k < i);
  });
  if (i >= 0) $('t'+i)?.scrollIntoView({behavior:'smooth', block:'center'});
}

$('playpause').onclick = () => {
  if (audio.paused){ audio.play(); $('playpause').textContent = 'Pause'; }
  else { audio.pause(); $('playpause').textContent = 'Resume'; }
};
$('stop').onclick = () => { audio.pause(); audio.currentTime = 0; cur = -1; highlight(-1); faceActive(null); $('playpause').textContent = 'Pause'; };
$('restart').onclick = () => { play(0); };
$('export').onclick = () => { if (sid) location.href = `/export/${sid}?gap=${gapMs}`; };

function reset(){
  sid = null; ready = new Set(); cur = -1; n = 0; finished = false; lines = [];
  audio.pause(); audio.removeAttribute('src');
  $('transcript').innerHTML = ''; $('labels').innerHTML = ''; faceActive(null);
  $('controls').classList.add('hidden'); $('pausebar').classList.add('hidden'); $('export').disabled = true;
  $('playpause').textContent = 'Pause';
}
</script>
</body>
</html>
