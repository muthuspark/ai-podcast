<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Podcast</title>
<style>
  :root { --bg:#0f1014; --fg:#e7e7ea; --dim:#6b6d77; --accent:#7c9cff; --card:#181a20; }
  * { box-sizing: border-box; }
  body {
    margin:0; min-height:100vh; background:var(--bg); color:var(--fg);
    font:16px/1.6 system-ui,-apple-system,sans-serif;
    display:flex; justify-content:center; padding:48px 20px;
  }
  main { width:100%; max-width:620px; }
  h1 { font-size:22px; font-weight:600; letter-spacing:-.01em; margin:0 0 28px; }
  h1 span { color:var(--dim); font-weight:400; }
  form { display:flex; flex-direction:column; gap:14px; }
  input, select, button { font:inherit; color:var(--fg); }
  input, select {
    background:var(--card); border:1px solid #262932; border-radius:10px;
    padding:13px 15px; outline:none;
  }
  input:focus, select:focus { border-color:var(--accent); }
  .row { display:flex; gap:10px; }
  .row select { flex:0 0 130px; }
  .row input { flex:1; }
  button {
    background:var(--accent); color:#0b0d12; border:0; border-radius:10px;
    padding:13px; font-weight:600; cursor:pointer;
  }
  button:disabled { opacity:.4; cursor:default; }
  .ghost { background:transparent; color:var(--fg); border:1px solid #2b2f3a; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; margin:26px 0 6px; }
  .chip {
    background:var(--card); border:1px solid #262932; border-radius:999px;
    padding:6px 13px; font-size:13px;
  }
  .chip b { color:var(--accent); font-weight:600; }
  .chip span { color:var(--dim); }
  /* animated speaker faces — mouth scaleY is driven live by audio volume */
  .stage { display:flex; flex-wrap:wrap; justify-content:center; gap:22px; margin:26px 0 6px; }
  .avatar { display:flex; flex-direction:column; align-items:center; gap:7px; width:104px; text-align:center; opacity:.4; transition:opacity .25s; }
  .avatar.active { opacity:1; }
  .face { position:relative; width:74px; height:74px; border-radius:50%;
    background:hsl(var(--hue) 58% 58%); box-shadow:inset 0 -8px 18px rgba(0,0,0,.18); transition:box-shadow .2s; }
  .avatar.active .face { box-shadow:inset 0 -8px 18px rgba(0,0,0,.18), 0 0 0 2px var(--accent), 0 0 22px -4px var(--accent); }
  .eye { position:absolute; top:29px; width:8px; height:8px; border-radius:50%; background:#11131a; transform-origin:center; }
  .eye.l { left:21px; } .eye.r { right:21px; }
  .avatar.active .eye { animation:blink 4.2s infinite; }
  @keyframes blink { 0%,93%,100%{ transform:scaleY(1);} 96%{ transform:scaleY(.1);} }
  .mouth { position:absolute; left:27px; bottom:15px; width:20px; height:6px; border-radius:11px;
    background:#11131a; transform:scaleY(1); transform-origin:center; transition:transform .05s linear; }
  .aname { font-weight:600; font-size:13px; }
  .apersona { color:var(--dim); font-size:11px; line-height:1.3; }
  .controls { display:flex; gap:8px; margin:22px 0 18px; }
  .controls button { flex:1; padding:11px; }
  #transcript { display:flex; flex-direction:column; gap:4px; }
  .turn { padding:11px 14px; border-radius:10px; opacity:.4; transition:opacity .2s,background .2s; }
  .turn.spoken { opacity:.7; }
  .turn.active { opacity:1; background:var(--card); }
  .turn .who { color:var(--accent); font-weight:600; font-size:13px; display:block; }
  .status { color:var(--dim); font-size:14px; margin:18px 0; min-height:20px; }
  .err { color:#ff7b7b; }
  .pausebar { display:flex; align-items:center; gap:12px; margin:0 0 18px; font-size:13px; color:var(--dim); }
  .pausebar input[type=range] { flex:1; accent-color:var(--accent); }
  .pausebar input[type=number] {
    width:72px; padding:6px 8px; background:var(--card); border:1px solid #262932;
    border-radius:8px; color:var(--fg); font:inherit; text-align:right;
  }
  .pausebar label { white-space:nowrap; }
  .hidden { display:none; }
</style>
</head>
<body>
<main>
  <h1>AI Podcast <span>· local</span></h1>

  <form id="form">
    <input id="topic" placeholder="Discussion topic…" autocomplete="off" required>
    <div class="row">
      <select id="speakers">
        <option value="1">1 speaker</option>
        <option value="2" selected>2 speakers</option>
        <option value="3">3 speakers</option>
        <option value="4">4 speakers</option>
      </select>
      <button id="start" type="submit">Start</button>
    </div>
  </form>

  <div id="chips" class="stage hidden"></div>
  <div id="status" class="status"></div>

  <div id="controls" class="controls hidden">
    <button class="ghost" id="playpause">Pause</button>
    <button class="ghost" id="stop">Stop</button>
    <button class="ghost" id="restart">Restart</button>
    <button class="ghost" id="export" disabled>Export</button>
  </div>

  <div id="pausebar" class="pausebar hidden">
    <label for="gap">Pause between speakers</label>
    <input type="range" id="gap" min="0" max="1500" step="10" value="135">
    <input type="number" id="gapnum" min="0" max="3000" step="10" value="135">
    <span>ms</span>
  </div>

  <div id="transcript"></div>
  <audio id="audio"></audio>
</main>

<script>
const $ = id => document.getElementById(id);
const audio = $('audio');
let sid = null, ready = new Set(), cur = -1, n = 0, finished = false, lines = [];

// --- live lip-sync: read the playing audio's volume, open the active mouth ---
let actx, analyser, dataArr, animating = false;
function audioGraph(){            // must run from a user gesture (Start click)
  if (actx){ actx.resume(); return; }
  actx = new (window.AudioContext || window.webkitAudioContext)();
  const src = actx.createMediaElementSource(audio);  // once per element
  analyser = actx.createAnalyser(); analyser.fftSize = 256;
  src.connect(analyser); analyser.connect(actx.destination);
  dataArr = new Uint8Array(analyser.fftSize);
  animating = true; requestAnimationFrame(tick);
}
function tick(){
  requestAnimationFrame(tick);
  const m = document.querySelector('.avatar.active .mouth');
  if (!m) return;
  let open = 0;
  if (analyser && !audio.paused){
    analyser.getByteTimeDomainData(dataArr);
    let sum = 0; for (let j = 0; j < dataArr.length; j++){ const x = (dataArr[j]-128)/128; sum += x*x; }
    open = Math.min(1, Math.sqrt(sum/dataArr.length) * 4);
  }
  m.style.transform = `scaleY(${1 + open * 5})`;
}
function faceActive(name){
  document.querySelectorAll('.avatar').forEach(a => a.classList.toggle('active', a.dataset.name === name));
}

// Inter-speaker pause (ms), applied live at playback — tune without re-voicing.
// Default 135ms ≈ natural conversational floor-transfer offset (Stivers et al. 2009).
let gapMs = 135;
const gapRange = $('gap'), gapNum = $('gapnum');
function setGap(v){ gapMs = Math.max(0, Math.min(3000, +v || 0)); gapRange.value = Math.min(gapMs, 1500); gapNum.value = gapMs; }
gapRange.addEventListener('input', () => setGap(gapRange.value));
gapNum.addEventListener('input', () => setGap(gapNum.value));

function setStatus(msg, err=false){ $('status').className = 'status' + (err?' err':''); $('status').textContent = msg; }

$('form').addEventListener('submit', e => {
  e.preventDefault();
  const topic = $('topic').value.trim();
  if (!topic) return;
  reset();
  audioGraph();                 // create/resume the audio context within the click gesture
  $('start').disabled = true;
  setStatus('Writing the script…');
  const es = new EventSource(`/generate?topic=${encodeURIComponent(topic)}&speakers=${$('speakers').value}`);

  es.addEventListener('speakers', e => {
    const d = JSON.parse(e.data); sid = d.sid;
    $('chips').classList.remove('hidden');
    $('chips').innerHTML = d.speakers.map(s =>
      `<div class="chip"><b>${s.name}</b> <span>· ${s.persona}</span></div>`).join('');
  });

  es.addEventListener('script', e => {
    const lines = JSON.parse(e.data).lines; n = lines.length;
    $('transcript').innerHTML = lines.map((l,i) =>
      `<div class="turn" id="t${i}"><span class="who">${l.speaker}</span>${l.line}</div>`).join('');
    $('controls').classList.remove('hidden');
    $('pausebar').classList.remove('hidden');
    setStatus('Voicing the conversation…');
  });

  es.addEventListener('line', e => {
    ready.add(JSON.parse(e.data).index);
    if (cur === -1) play(0);        // start as soon as line 0 lands
    else if (audio.paused && cur < n && ready.has(cur)) play(cur); // resume a stall
  });

  es.addEventListener('done', () => { finished = true; $('export').disabled = false; setStatus('Ready.'); es.close(); $('start').disabled = false; });
  es.addEventListener('error', e => {
    const msg = e.data ? JSON.parse(e.data).message : 'Connection lost.';
    setStatus(msg, true); es.close(); $('start').disabled = false;
  });
});

function play(i){
  if (i >= n){ highlight(-1); setStatus(finished ? 'Done.' : 'Ready.'); return; }
  if (!ready.has(i)){ cur = i; setStatus('Buffering next line…'); return; } // wait for 'line'
  cur = i; highlight(i); $('playpause').textContent = 'Pause';
  audio.src = `/audio/${sid}/${i}.wav`; audio.play();
}
audio.addEventListener('ended', () => { if (cur >= 0) setTimeout(() => play(cur + 1), gapMs); });

function highlight(i){
  document.querySelectorAll('.turn').forEach((t,k) => {
    t.classList.toggle('active', k === i);
    t.classList.toggle('spoken', k < i);
  });
  if (i >= 0) $('t'+i)?.scrollIntoView({behavior:'smooth', block:'center'});
}

$('playpause').onclick = () => {
  if (audio.paused){ audio.play(); $('playpause').textContent = 'Pause'; }
  else { audio.pause(); $('playpause').textContent = 'Resume'; }
};
$('stop').onclick = () => { audio.pause(); audio.currentTime = 0; cur = -1; highlight(-1); $('playpause').textContent = 'Pause'; };
$('restart').onclick = () => { play(0); };
$('export').onclick = () => { if (sid) location.href = `/export/${sid}?gap=${gapMs}`; };

function reset(){
  sid = null; ready = new Set(); cur = -1; n = 0; finished = false;
  audio.pause(); audio.removeAttribute('src');
  $('transcript').innerHTML = ''; $('chips').innerHTML = '';
  $('controls').classList.add('hidden'); $('pausebar').classList.add('hidden'); $('export').disabled = true;
  $('playpause').textContent = 'Pause';
}
</script>
</body>
</html>
